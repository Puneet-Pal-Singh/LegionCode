name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  check-types:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Run type checks
        run: pnpm check-types

  boundaries:
    name: Boundary Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run import boundary checks
        run: pnpm check:boundaries

      - name: Run architecture boundary tests
        run: |
          pnpm --filter @shadowbox/brain test -- src/architecture/layering.boundary.test.ts src/architecture/no-legacy-imports.test.ts
          pnpm --filter @shadowbox/web test -- src/architecture/byok-sdk-boundary.test.ts src/architecture/provider-sdk-import-boundary.test.ts src/architecture/landing-boundary.test.ts
          pnpm --filter @repo/ui-kit test -- src/architecture/provider-transport-boundary.test.ts
          pnpm --filter @shadowbox/landing test -- --run

  runtime-conformance:
    name: Runtime Conformance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Run runtime conformance gate
        run: pnpm gate:runtime-conformance

  contract-conformance:
    name: Contract Conformance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run canonical contract conformance suites
        run: pnpm gate:contract-conformance

  capability-preservation:
    name: Capability Preservation Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run demo-critical capability preservation suites
        run: pnpm gate:capability-preservation

  rebuild-governance:
    name: Rebuild Governance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR governance context
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}"
          {
            echo "REBUILD_CHANGED_FILES<<EOF"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD"
            echo "EOF"
            echo "REBUILD_PR_BODY<<EOF"
            node -e 'const fs = require("node:fs"); const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")); process.stdout.write(event.pull_request?.body ?? "");'
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run rebuild governance gate
        env:
          REBUILD_PR_METADATA_MODE: report-only
        run: pnpm gate:rebuild-governance

  dev-smoke:
    name: Dev Smoke Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deterministic dev smoke gate
        run: pnpm gate:dev-smoke

  golden-repo-to-pr:
    name: Golden Repo-To-PR Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hermetic repo-to-PR golden gate
        run: pnpm gate:golden-repo-to-pr

  staging-cutover:
    name: Staging Cutover Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run staging/cutover substitute gate
        run: pnpm gate:staging-cutover

  pr-metadata-governance:
    name: PR Metadata Governance (report-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect PR metadata context
        run: |
          git fetch origin "${{ github.base_ref }}"
          {
            echo "REBUILD_CHANGED_FILES<<EOF"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD"
            echo "EOF"
            echo "REBUILD_PR_BODY<<EOF"
            node -e 'const fs = require("node:fs"); const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")); process.stdout.write(event.pull_request?.body ?? "");'
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Validate PR metadata
        env:
          REBUILD_PR_METADATA_MODE: blocking
        run: node scripts/gates/check-rebuild-governance.mjs

  full-web-test-report:
    name: Full Web Tests (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      QUARANTINE_OWNER: "@shadowbox/web"
      QUARANTINE_EXPIRES_ON: "2026-07-15"
      PROMOTION_CRITERIA: "Three consecutive green dev runs with no timeout-dependent failures."
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full web tests
        run: pnpm --filter @shadowbox/web test -- --run

      - name: Report-only gate metadata
        if: always()
        run: |
          echo "Full web tests remain report-only while existing flaky and failing tests are stabilized."
          echo "Owner: ${QUARANTINE_OWNER}"
          echo "Expires on: ${QUARANTINE_EXPIRES_ON}"
          echo "Promotion criteria: ${PROMOTION_CRITERIA}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        check-types,
        boundaries,
        runtime-conformance,
        contract-conformance,
        capability-preservation,
        rebuild-governance,
        dev-smoke,
        golden-repo-to-pr,
        staging-cutover,
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

  release-quality-gates:
    name: Release Quality Gates (blocking)
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Run boundary checks (strict)
        run: |
          pnpm check:boundaries
          pnpm --filter @shadowbox/brain test -- src/architecture/layering.boundary.test.ts src/architecture/no-legacy-imports.test.ts
          pnpm --filter @shadowbox/web test -- src/architecture/byok-sdk-boundary.test.ts src/architecture/provider-sdk-import-boundary.test.ts src/architecture/landing-boundary.test.ts
          pnpm --filter @repo/ui-kit test -- src/architecture/provider-transport-boundary.test.ts
          pnpm --filter @shadowbox/landing test -- --run

      - name: Run smoke checks (strict)
        run: |
          pnpm gate:dev-smoke
          pnpm gate:capability-preservation
          pnpm --filter @shadowbox/web test -- --run

      - name: Run runtime conformance gate (strict)
        run: |
          pnpm gate:runtime-conformance
          pnpm gate:contract-conformance
          pnpm gate:golden-repo-to-pr
          pnpm gate:staging-cutover

      - name: Run rebuild governance gate (strict)
        run: pnpm gate:rebuild-governance
